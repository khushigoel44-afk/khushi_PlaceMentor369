<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Register for PlaceMentor369 and kickstart your placement preparation journey with our comprehensive tools.">
  <title>Register – PlacementorAI</title>

  <!-- Tailwind, Icons, Fonts, GSAP -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/register.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://unpkg.com https://cdnjs.cloudflare.com https://cdn.botpress.cloud https://files.bpcontent.cloud;
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net;
  font-src 'self' https://fonts.gstatic.com;
  img-src 'self' https://img.icons8.com data:;
  connect-src 'self' http://localhost:5000 https://unpkg.com;
  ">

  <style>
    body { font-family: 'Inter', sans-serif; }
    body,
    header, section, footer, button, input, textarea, select,
    a, h1, h2, h3, h4, h5, h6, p, span, label, .bg-white {
      transition:
        background-color 0.35s ease,
        color 0.35s ease,
        border-color 0.35s ease,
        box-shadow 0.35s ease;
    }

    .theme-toggle-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 46px;
      height: 42px;
      font-size: 18px;
      line-height: 1;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #e5e7eb;
      color: #111827;
    }

    .dark .theme-toggle-btn {
      background: #334155;
      color: white;
    }
  </style>
</head>

<body class="bg-slate-50 dark:bg-gray-900 min-h-screen flex flex-col transition-colors">

  <header class="bg-white dark:bg-gray-800 border-b border-slate-200 dark:border-gray-700">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <a href="index.html" class="text-2xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">PlacementorAI</a>
      <nav class="hidden md:flex items-center gap-6">
        <a href="index.html" class="text-gray-600 dark:text-gray-300 hover:text-indigo-600 font-medium transition">Home</a>
        <a href="contact.html" class="text-gray-600 dark:text-gray-300 hover:text-indigo-600 font-medium transition">Contact</a>
        <a href="login.html" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg font-medium transition">Login</a>
      </nav>
      <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark mode">🌙</button>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-6 py-12">
    <div id="register-card" class="w-full max-w-md opacity-0 translate-y-6 transition-all duration-500">

      <div class="text-center mb-6">
        <h1 class="text-4xl font-bold text-gray-900 dark:text-white mb-2">Create Account</h1>
        <p class="text-gray-600 dark:text-gray-400">Join PlacementorAI today</p>
      </div>

      <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-2xl border border-slate-200 dark:border-gray-700">
        <form id="registerForm" class="space-y-4 needs-validation" novalidate>

          <!-- Full Name -->
          <div>
            <label for="name" class="text-sm font-medium text-gray-700 dark:text-gray-200 block">Full Name</label>
            <input id="name" type="text" required placeholder="John Doe" autocomplete="name"
              class="mt-1 w-full px-4 py-3 rounded-xl border dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none form-control">
            <div class="invalid-feedback">Full name is required.</div>
            <div class="valid-feedback">Looks good.</div>
          </div>

          <!-- Email -->
          <div>
            <label for="email" class="text-sm font-medium text-gray-700 dark:text-gray-200 block">Email</label>
            <input id="email" type="email" required placeholder="you@example.com" autocomplete="email"
              class="mt-1 w-full px-4 py-3 rounded-xl border dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none form-control">
            <div class="invalid-feedback">Please enter a valid email address.</div>
            <div class="valid-feedback">Valid email.</div>
          </div>

          <!-- Password -->
          <div class="relative">
            <label for="password" class="text-sm font-medium text-gray-700 dark:text-gray-200 block">Password</label>
            <input id="password" type="password" required placeholder="••••••••" autocomplete="new-password"
              class="mt-1 w-full px-4 py-3 pr-12 rounded-xl border dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none form-control">
            <div class="invalid-feedback">Password must be at least 8 characters.</div>
            <div class="valid-feedback">Strong password.</div>
            <button type="button" id="togglePassword"
              class="absolute right-4 top-[38px] text-gray-400 hover:text-indigo-600" aria-label="Toggle password visibility">
              <i data-lucide="eye" id="eyeIcon"></i>
            </button>
          </div>

          <!-- Role -->
          <div>
            <label for="role" class="text-sm font-medium text-gray-700 dark:text-gray-200 block">Role</label>
            <select id="role" required
              class="mt-1 w-full px-4 py-3 rounded-xl border dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer form-select">
              <option value="" disabled selected>Choose your role</option>
              <option value="student">Student</option>
              <option value="recruiter">Recruiter</option>
              <option value="admin">Placement Officer</option>
            </select>
            <div class="invalid-feedback">Please select a role.</div>
            <div class="valid-feedback">Looks good.</div>
          </div>

          <!-- Submit -->
          <button type="submit" id="submitBtn"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-xl flex justify-center items-center gap-2 transition active:scale-95 disabled:opacity-50">
            <i data-lucide="user-plus"></i>
            <span id="btnText">Create Account</span>
          </button>

        </form>
      </div>

      <p class="text-center text-sm mt-6 text-gray-600 dark:text-gray-400">
        Already have an account?
        <a href="login.html" class="text-indigo-600 font-semibold hover:underline">Log In</a>
      </p>
    </div>
  </main>

  <script src="js/theme.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/register.js" defer></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (window.lucide) lucide.createIcons();
      gsap.to("#register-card", { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" });
    });
  </script>
  <script src="https://cdn.botpress.cloud/webchat/v3.5/inject.js"></script>
  <script src="https://files.bpcontent.cloud/2026/01/29/16/20260129163015-0ZV4O3BK.js" defer></script>

</body>

</html>
