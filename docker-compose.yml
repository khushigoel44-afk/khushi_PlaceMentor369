services:
  mongodb:
    image: mongo:6.0
    container_name: placementor_db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - placementor_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: placementor_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/placementor
      - PORT=5000
    depends_on:
      - mongodb
    networks:
      - placementor_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: placementor_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - placementor_network

volumes:
  mongo_data:
    driver: local

networks:
  placementor_network:
    driver: bridge